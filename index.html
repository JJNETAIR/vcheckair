<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Air - Voucher Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F5F5F7] text-[#1D1D1F] min-h-screen p-4 md:p-8">

    <header class="max-w-md mx-auto mb-8 text-center">
        <div class="w-16 h-16 bg-white rounded-3xl mx-auto mb-4 shadow-lg flex items-center justify-center">
            <span class="text-3xl"></span>
        </div>
        <h1 class="text-2xl font-bold tracking-tight">Apple Air Portal</h1>
        <p class="text-gray-500 text-sm">Secure Voucher Verification</p>
    </header>

    <main class="max-w-md mx-auto">
        <div id="view-entry" class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Voucher Code</label>
            <input type="text" id="voucher-input" placeholder="Enter Code (e.g., A123)" 
                   class="w-full bg-gray-50 rounded-2xl p-4 mb-4 text-lg font-medium outline-none border-2 border-transparent focus:border-blue-500 transition-all">
            <button id="check-btn" class="w-full bg-black text-white py-4 rounded-2xl font-semibold hover:bg-gray-800 transition-all">
                Validate Voucher
            </button>
        </div>

        <div id="view-dashboard" class="hidden space-y-4">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Connection Details</h3>
                <div id="festa-data-container" class="space-y-4">
                    </div>
            </div>
            <button id="back-btn" class="w-full bg-gray-200 text-gray-700 py-4 rounded-2xl font-semibold">
                Back to Search
            </button>
        </div>

        <div id="view-loading" class="hidden text-center py-10">
            <div class="animate-spin w-8 h-8 border-4 border-gray-300 border-t-black rounded-full mx-auto"></div>
            <p class="mt-4 text-sm text-gray-500">Syncing with server...</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
