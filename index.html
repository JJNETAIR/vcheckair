<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Air - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F5F5F7] min-h-screen p-4">

    <div class="max-w-sm mx-auto mt-10">
        <div id="view-entry" class="bg-white rounded-3xl p-6 shadow-sm">
            <h1 class="text-xl font-bold mb-6">Voucher Portal</h1>
            <input type="text" id="voucher-input" placeholder="Enter Code" class="w-full bg-gray-100 rounded-2xl p-4 mb-4 outline-none">
            <button id="check-btn" class="w-full bg-black text-white py-4 rounded-2xl">Validate</button>
        </div>

        <div id="view-dashboard" class="hidden">
            <div class="bg-white rounded-3xl p-6 shadow-sm">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-4">Voucher Details</h3>
                <div id="festa-data-container" class="space-y-2"></div>
            </div>
            <button id="back-btn" class="w-full mt-4 bg-gray-200 py-4 rounded-2xl font-bold">Back</button>
        </div>

        <div id="view-loading" class="hidden text-center py-10">
            <div class="animate-spin w-8 h-8 border-4 border-gray-300 border-t-black rounded-full mx-auto"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
