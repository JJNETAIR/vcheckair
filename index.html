<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Air - Voucher Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', 'sans-serif'] },
                    boxShadow: { 'apple': '0 4px 30px rgba(0, 0, 0, 0.03)', 'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.06)' }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F5F5F7] text-[#1D1D1F] min-h-screen flex flex-col justify-between">
    
    <header class="w-full py-6 px-8 flex justify-center items-center">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 rounded-lg bg-white/40 border border-white/60 backdrop-blur-md shadow-apple flex items-center justify-center">
                <span class="text-xs font-semibold opacity-60"></span>
            </div>
            <span class="text-sm font-medium tracking-tight text-[#86868B]">Apple Air</span>
        </div>
    </header>

    <main class="w-full max-w-md mx-auto px-6 flex-grow flex flex-col justify-center items-center">
        <div id="view-entry" class="w-full bg-white/70 border border-white/60 backdrop-blur-xl rounded-3xl p-8 shadow-glass space-y-8">
            <div class="text-center space-y-2">
                <h1 class="text-2xl font-semibold tracking-tight">Internet Voucher</h1>
                <p class="text-sm text-[#86868B]">Enter your access code to view connection data and validity.</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="voucher-input" placeholder="e.g. 123456" autocomplete="off" class="w-full px-5 py-4 bg-white/50 border border-gray-200 rounded-2xl text-base font-medium text-center uppercase focus:outline-none focus:border-blue-500 focus:bg-white shadow-inner">
                <button onclick="streamLiveVerification()" class="w-full py-4 bg-[#0071E3] hover:bg-[#0077ED] text-white font-medium rounded-2xl shadow-md">Check Validity</button>
            </div>
        </div>

        <div id="view-dashboard" class="w-full bg-white/70 border border-white/60 backdrop-blur-xl rounded-3xl p-8 shadow-glass space-y-6 hidden transform translate-y-4 opacity-0 transition-all duration-300">
            <div class="flex flex-col items-center text-center space-y-2">
                <div class="w-12 h-12 rounded-full bg-emerald-50 border border-emerald-200 flex items-center justify-center text-emerald-500 text-xl font-bold">✓</div>
                <h2 class="text-xl font-semibold tracking-tight">Voucher Active</h2>
                <p id="dash-code-display" class="text-xs font-mono bg-gray-100 text-gray-600 px-3 py-1 rounded-full uppercase tracking-wider">CODE</p>
            </div>
            <div class="bg-white/50 border border-gray-100 rounded-2xl overflow-hidden divide-y divide-gray-100 shadow-inner">
                <div class="flex justify-between items-center px-5 py-4">
                    <span class="text-sm font-medium text-[#86868B]">Time Remaining</span>
                    <span id="dash-time" class="text-base font-semibold">--</span>
                </div>
                <div class="flex justify-between items-center px-5 py-4">
                    <span class="text-sm font-medium text-[#86868B]">Data Allowance</span>
                    <span id="dash-data" class="text-base font-semibold">--</span>
                </div>
                <div class="flex justify-between items-center px-5 py-4">
                    <span class="text-sm font-medium text-[#86868B]">Speed Tier</span>
                    <span id="dash-speed" class="text-sm font-medium bg-blue-50 text-blue-600 px-3 py-1 rounded-md">--</span>
                </div>
            </div>
            <button onclick="backToEntryView()" class="w-full py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-2xl">Check Another Voucher</button>
        </div>

        <div id="view-loading" class="hidden flex flex-col items-center space-y-4">
            <div class="w-8 h-8 border-4 border-gray-200 border-t-blue-500 rounded-full animate-spin"></div>
            <p class="text-xs font-medium text-[#86868B]">Streaming data from cloud network sync...</p>
        </div>
    </main>

    <footer class="w-full py-6 text-center text-[11px] text-[#86868B]">&copy; 2026 Apple Air. All rights reserved.</footer>

    <script>
        // PASTE YOUR KEYS HERE ACCURATELY
        const BIN_ID = "YOUR_JSONBIN_BIN_ID_HERE"; 
        const MASTER_KEY = "YOUR_JSONBIN_MASTER_KEY_HERE"; 

        function renderView(viewId) {
            ['view-entry', 'view-dashboard', 'view-loading'].forEach(v => {
                const el = document.getElementById(v);
                if (v === viewId) {
                    el.classList.remove('hidden');
                    setTimeout(() => el.classList.remove('opacity-0', 'translate-y-4'), 20);
                } else { el.classList.add('hidden', 'opacity-0', 'translate-y-4'); }
            });
        }

        async function streamLiveVerification() {
            const userInput = document.getElementById('voucher-input').value.trim().toLowerCase();
            if (!userInput) return alert('Please enter a voucher code.');

            renderView('view-loading');

            try {
                // 1. Fetch spreadsheet URL string from cloud storage
                const cloudResponse = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { "X-Master-Key": MASTER_KEY }
                });
                const cloudData = await cloudResponse.json();
                const activeUrl = cloudData.record.url;

                if (!activeUrl) throw new Error("Cloud sync record is empty. Go to admin panel and save link.");

                const match = activeUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if (!match) throw new Error("The saved link inside JSONBin does not match a clean Google Spreadsheet ID layout.");
                
                const spreadsheetId = match[1];
                const csvEndpoint = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=0&cache_bypass=${Date.now()}`;

                // 2. Fetch direct spreadsheet content strings
                const response = await fetch(csvEndpoint);
                const csvText = await response.text();
                
                // If Google sends back HTML login text instead of plain CSV text data rows
                if (csvText.trim().startsWith('<!DOCTYPE html>') || csvText.includes('google.com/signout')) {
                    throw new Error("Google is blocking access. Please open your spreadsheet and go to File -> Share -> Publish to Web -> Choose CSV.");
                }

                const rows = csvText.split(/\r?\n/);
                if (rows.length < 2 || !rows[0].trim()) throw new Error("The active spreadsheet matching this cloud URL appears empty.");

                let delimiter = rows[0].includes(';') ? ';' : ',';
                const headers = rows[0].split(delimiter).map(h => h.replace(/^["']|["']$/g, '').trim().toLowerCase());
                
                const codeColumnIndex = headers.indexOf('code');
                if (codeColumnIndex === -1) {
                    throw new Error("Could not find a header named exactly 'code' in Row 1 of your sheet.");
                }

                let foundVoucher = null;

                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i].trim()) continue;
                    
                    const columns = rows[i].split(delimiter).map(c => c.replace(/^["']|["']$/g, '').trim());
                    
                    if (columns[codeColumnIndex] && columns[codeColumnIndex].toLowerCase() === userInput) {
                        const record = {};
                        headers.forEach((h, idx) => {
                            record[h] = columns[idx] || '';
                        });

                        foundVoucher = {
                            code: columns[codeColumnIndex].toUpperCase(),
                            timeRemaining: record['timeremaining'] || 'Active',
                            dataAllowance: record['dataallowance'] || 'Unlimited',
                            speedTier: record['speedtier'] || 'High Speed Profile'
                        };
                        break;
                    }
                }

                if (!foundVoucher) {
                    alert(`Voucher code "${userInput.toUpperCase()}" is not registered on your Google Sheet grid setup.`);
                    renderView('view-entry');
                    return;
                }

                document.getElementById('dash-code-display').innerText = foundVoucher.code;
                document.getElementById('dash-time').innerText = foundVoucher.timeRemaining;
                document.getElementById('dash-data').innerText = foundVoucher.dataAllowance;
                document.getElementById('dash-speed').innerText = foundVoucher.speedTier;
                
                renderView('view-dashboard');

            } catch (err) {
                alert("Portal Configuration Error: " + err.message);
                renderView('view-entry');
            }
        }

        function backToEntryView() { 
            document.getElementById('voucher-input').value = ''; 
            renderView('view-entry'); 
        }
    </script>
</body>
</html>
